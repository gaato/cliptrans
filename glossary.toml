# cliptrans 固有名詞辞書
# 配信ごとに出てくる固有名詞 (人名・曲名・衣装名・ゲーム用語など) をここに追記してください。
# cliptrans.toml とは別ファイルなので、技術設定を触らずに用語だけ更新できます。
#
# ─────────────────────────────────────────────────────────────────────────────
# [asr_corrections]  ASR (文字起こし) が誤認識しやすい語の補正
#   形式: "ASR が出力する誤ったテキスト" = "正しいテキスト"
#   regroup・翻訳の前に適用されるため、誤訳も防げます。
#
# [glossary]         翻訳時に LLM へ渡す対訳表
#   形式: "原語" = "訳語"
#   LLM のシステムプロンプトに「この語はこう訳せ」として挿入されます。
# ─────────────────────────────────────────────────────────────────────────────

[asr_corrections]
"dandel dress" = "Dirndl"
"dandel" = "Dirndl"
"fogerfly" = "Vogelfrei"
"foger fly" = "Vogelfrei"
"Kana Uru" = "Kanauru"

[glossary]
"Dirndl" = "ディアンドル"
"Vogelfrei" = "フォーゲルフライ"
"Kanauru" = "カナウル"
