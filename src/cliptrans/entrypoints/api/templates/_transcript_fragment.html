<div class="transcript-list">
{% if lines %}
  {% for line in lines %}
  <div class="transcript-line">
    <button class="time-btn transcript-ts" onclick="seekTo({{ line.start_sec }})">
      {{ line.start }}
    </button>
    <span class="transcript-text">{{ line.text }}</span>
  </div>
  {% endfor %}
{% else %}
  <p class="empty-message">No subtitle data available.</p>
{% endif %}
</div>
